<div class="form-group row">

  <label class="col-sm-2 col-form-label">Breakdown Category Name</label>
  <div class="col-sm-10">
      <input type="text" class="form-control" [(ngModel)]="product_Name"
      placeholder="Enter Product">
  </div>
</div>

<button (click)="addProduct()" *ngIf="pro.id==0" class="btn btn-success">
  Add
</button>

<button (click)="updateProduct()" *ngIf="pro.id!=0" class="btn btn-primary">
  Update
</button>
