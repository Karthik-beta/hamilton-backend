<div class="form-group row">

  <label class="col-sm-2 col-form-label">Designation Name</label>
  <div class="col-sm-10">
      <input type="text" class="form-control" [(ngModel)]="DesignationName"
      placeholder="Enter Designation Name">
  </div>
</div>

<button (click)="addDesignation()" *ngIf="des.DesignationId==0" class="btn btn-primary">
  Add
</button>

<button (click)="updateDesignation()" *ngIf="des.DesignationId!=0" class="btn btn-primary">
  Update
</button>
