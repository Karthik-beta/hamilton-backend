<div class="form-group row">

    <label class="col-sm-2 col-form-label">Breakdown Category Name</label>
    <div class="col-sm-10">
        <input type="text" class="form-control" [(ngModel)]="breakdownCategoryName"
        placeholder="Enter Breakdown Category">
    </div>
  </div>

  <button (click)="addBreakdowncategory()" *ngIf="bdc.breakdownCategoryId==0" class="btn btn-success">
    Add
  </button>

  <button (click)="updateBreakdowncategory()" *ngIf="bdc.breakdownCategoryId!=0" class="btn btn-primary">
    Update
  </button>
