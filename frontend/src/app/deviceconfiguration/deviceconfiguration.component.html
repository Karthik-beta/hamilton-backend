  <div class="form-row">
    <div class="form-group col">
      <label for="company">Company</label>
      <select class="form-control" id="in-out">
        <option value="" selected diabled>Select From Options</option>
        <option value="in">1234</option>
        <option value="out">5678</option>
        <option value="both">6579</option>
      </select>
    </div>
    <div class="form-group col">
      <label for="location">Location</label>
      <select class="form-control" id="in-out">
        <option value="" selected diabled>Select From Options</option>
        <option value="in">1234</option>
        <option value="out">5678</option>
        <option value="both">6579</option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group col">
      <label for="device-serial-no">Device Name</label>
      <input type="text" class="form-control" id="device-serial-no">
    </div>
    <div class="form-group col">
      <label for="device-serial-no">Device Serial Number</label>
      <input type="text" class="form-control" id="device-serial-no">
    </div>
  </div>

  <div class="form-row">
    <div class="form-group col">
      <label for="device-serial-no">Device IP</label>
      <input type="text" class="form-control" id="device-serial-no" placeholder="Enter IP address (e.g., 192.168.1.1)">
    </div>
    <div class="form-group col">
      <label for="device-serial-no">Device Number</label>
      <input type="text" class="form-control" id="device-serial-no">
    </div>
  </div>

  <div class="form-row">
    <div class="form-group col">
      <label for="reader-code">Reader Code</label>
      <input type="text" class="form-control" id="reader-code">
    </div>
    <div class="form-group col">
      <label for="reader-desc">Reader Description</label>
      <input type="text" class="form-control" id="reader-desc">
    </div>
  </div>


  <div class="form-row">
    <div class="form-group col">
      <label for="in-out">In/Out</label>
      <select class="form-control" id="in-out">
        <option value="" selected diabled>Select From Options</option>
        <option value="in">In</option>
        <option value="out">Out</option>
        <option value="both">Both</option>
      </select>
    </div>
    <div class="form-group col">
      <label for="purpose">Purpose</label>
      <select class="form-control" id="purpose">
        <option value="" selected diabled>Select From Options</option>
        <option value="attendance">Attendance</option>
        <option value="xyz">XYZ</option>
      </select>
    </div>
  </div>
